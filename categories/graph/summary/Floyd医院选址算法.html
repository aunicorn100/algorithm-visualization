<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <script>
(function () {
  if (window.__htmlSanitizerInstalled) return;
  window.__htmlSanitizerInstalled = true;

  const descriptor = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  if (!descriptor || !descriptor.set || !descriptor.get) return;

  const nativeSetter = descriptor.set;
  const nativeGetter = descriptor.get;
  const allowedTags = new Set(['A','B','BR','BUTTON','CODE','DIV','EM','I','LI','OL','P','PRE','SMALL','SPAN','STRONG','SUB','SUP','TABLE','TBODY','TD','TH','THEAD','TR','UL']);
  const urlAttrs = new Set(['href','src','xlink:href']);
  const allowedAttrs = new Set(['class','id','role','title','style','colspan','rowspan','disabled','readonly','type','value','min','max','step']);

  function isSafeAttr(name, value) {
    const lowerName = name.toLowerCase();
    const lowerValue = String(value || '').trim().toLowerCase();
    if (lowerName.startsWith('on')) return false;
    if (lowerName.startsWith('aria-') || lowerName.startsWith('data-')) return true;
    if (!allowedAttrs.has(lowerName) && !urlAttrs.has(lowerName)) return false;
    if (urlAttrs.has(lowerName)) return /^(#|\/|\.\/|\.\.\/|https?:)/i.test(String(value || '').trim());
    if (lowerName === 'style') return !/(expression\s*\(|url\s*\(|javascript\s*:)/i.test(String(value || ''));
    return true;
  }

  function sanitizeHTML(value) {
    const template = document.createElement('template');
    nativeSetter.call(template, String(value ?? ''));
    template.content.querySelectorAll('*').forEach((node) => {
      if (!allowedTags.has(node.tagName)) {
        node.replaceWith(document.createTextNode(node.textContent || ''));
        return;
      }
      Array.from(node.attributes).forEach((attr) => {
        if (!isSafeAttr(attr.name, attr.value)) node.removeAttribute(attr.name);
      });
    });
    return nativeGetter.call(template);
  }

  window.escapeHTML = function (value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  };

  Object.defineProperty(Element.prototype, 'innerHTML', {
    configurable: true,
    enumerable: descriptor.enumerable,
    get: function () { return nativeGetter.call(this); },
    set: function (value) { nativeSetter.call(this, sanitizeHTML(value)); }
  });

  const nativeInsertAdjacentHTML = Element.prototype.insertAdjacentHTML;
  Element.prototype.insertAdjacentHTML = function (position, value) {
    return nativeInsertAdjacentHTML.call(this, position, sanitizeHTML(value));
  };
})();
</script>
<meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Floyd算法-医院选址可视化</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes pulse { 0% { stroke-width:2; } 50% { stroke-width:4; } 100% { stroke-width:2; } }
    @keyframes borderFlash {
      0% { border-color: #ddd; }
      50% { border-color: #ef4444; border-width: 3px; }
      100% { border-color: #10b981; border-width: 2px; }
    }
    
    .matrix-cell { min-width:50px; height:40px; display:flex; align-items:center; justify-content:center; border:1px solid #ddd; transition: all 0.3s; }
    .matrix-cell.hl { background:#fef3c7; border-color:#f59e0b; }
    .matrix-cell.updated { 
      background:#dcfce7; 
      border-color:#10b981; 
      animation: fadeIn 0.5s ease, borderFlash 0.8s ease;
    }
    .matrix-cell.current { 
      background:#dbeafe; 
      border-color:#3b82f6; 
      border-width: 2px;
    }
    .k-hl { color:#f59e0b; font-weight:bold; }
    .ij-hl { color:#0b6be6; font-weight:bold; }
    
    #graphCanvas { width:100%; height:400px; background:#fff; border-radius:8px; }
    .graph-vertex { transition:all 0.3s; }
    .graph-vertex.normal { fill:#f97316; stroke:#c2410c; stroke-width:2; }
    .graph-vertex.highlight { animation: blink 1s infinite; stroke:#f59e0b; stroke-width:4; }
    .graph-vertex.center { fill:#10b981; stroke:#047857; stroke-width:3; }
    .graph-edge.normal { stroke:#0000cc; stroke-width:2; }
    .graph-edge.active { animation: pulse 1.5s infinite; }
    .arrow { fill:#0000cc; stroke:#0000cc; }
    .edge-label { font-size:18px; font-weight:bold; fill:#0000cc; }
    .edge-label.active { animation: blink 1s infinite; fill:#f59e0b; }
    .vertex-label { font-size:24px; font-weight:bold; fill:#fff; }
    
    .calc-step { font-family: monospace; font-size: 14px; margin: 4px 0; padding: 4px; border-left: 3px solid #3b82f6; background: #eff6ff; }
    .calc-step.hidden { display: none; }
    .total-cost-row { padding:4px; border-radius:4px; }
    .total-cost-row.min { background:#dcfce7; font-weight:bold; color:#047857; }
  </style>
</head>
<body class="bg-gray-50 text-neutral-900">
<div class="max-w-7xl mx-auto px-4 py-6">
  <header class="flex items-center gap-4 mb-6">
    <div class="w-12 h-12 rounded-lg bg-orange-500 text-white flex items-center justify-center">
      <i class="fa-solid fa-hospital text-lg"></i>
    </div>
    <div>
      <h1 class="text-2xl font-semibold">Floyd算法 - 医院选址可视化</h1>
      <p class="text-sm text-gray-500 mt-0.5">动态版：最短路径计算 + 最优村庄选择</p>
    </div>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <section class="lg:col-span-4 bg-white rounded-xl p-4 shadow h-fit sticky top-6">
      <div class="mt-4 bg-yellow-50 rounded-xl p-4 shadow">
        <h3 class="text-sm font-medium mb-3">计算状态</h3>
        <div class="grid grid-cols-1 gap-3">
          <div class="bg-white rounded-lg px-3 py-2 shadow-sm">
            <span class="text-xs text-gray-500">当前步骤:</span>
            <span id="showStep" class="k-hl ml-1 font-mono">初始化</span>
          </div>
          <div class="bg-white rounded-lg px-3 py-2 shadow-sm">
            <span class="text-xs text-gray-500">当前k值:</span>
            <span id="currentK" class="ij-hl ml-1 font-mono">-</span>
          </div>
          <div class="bg-white rounded-lg px-3 py-2 shadow-sm">
            <span class="text-xs text-gray-500">算法重点：D[i][j]=min(D[i][j],D[i][k]+D[k][j])</span>
            <span id="currentIJ" class="text-blue-600 ml-1 font-mono">-</span>
          </div>
          <div class="bg-white rounded-lg px-3 py-2 shadow-sm">
            <span class="text-xs text-gray-500">最优医院位置:</span>
            <span id="bestVillage" class="text-green-600 ml-1 font-mono">-</span>
          </div>
          <div class="bg-white rounded-lg px-3 py-2 shadow-sm">
            <span class="text-xs text-gray-500">最小总代价:</span>
            <span id="minTotalCost" class="text-green-600 ml-1 font-mono">-</span>
          </div>
        </div>
      </div>

      <div class="mt-4 space-y-4">
        <div class="flex flex-wrap gap-2">
          <button id="btnInit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm"><i class="fa-solid fa-rotate-right mr-1"></i>初始化</button>
          <button id="btnStep" class="px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 text-sm"><i class="fa-solid fa-forward-step mr-1"></i>单步执行(k轮)</button>
          <button id="btnAuto" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm"><i class="fa-solid fa-play mr-1"></i>自动演示</button>
          <button id="btnPause" class="px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 text-sm" disabled><i class="fa-solid fa-pause mr-1"></i>暂停</button>
          <button id="btnShowResult" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm"><i class="fa-solid fa-check mr-1"></i>查看结果</button>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700">执行速度</label>
          <input type="range" id="speedSlider" min="800" max="3000" step="300" value="1500" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
          <div class="flex justify-between text-xs text-gray-500 mt-1"><span>快</span><span id="speedValue">1500 ms</span></div>
        </div>

        <div class="bg-white rounded-xl p-4 shadow mt-4">
          <h3 class="text-sm font-medium text-gray-800 mb-2">计算过程</h3>
          <div id="calcSteps" class="max-h-60 overflow-y-auto text-sm">
            <div class="calc-step" id="calc0">初始化距离矩阵D⁰</div>
          </div>
        </div>
      </div>
    </section>

    <section class="lg:col-span-8 space-y-6">
      <div class="bg-white rounded-xl p-6 shadow">
        <h3 class="text-sm font-medium text-gray-800 mb-4">村庄交通图可视化</h3>
        <svg id="graphCanvas"></svg>
      </div>
      
      <div class="bg-white rounded-xl p-6 shadow">        
        <div class="grid grid-cols-1 gap-6">
          <div class="bg-blue-50 rounded-xl p-3 shadow">
            <h3 class="text-sm font-medium text-gray-800 mb-2">Floyd最短路径矩阵 Dᵏ</h3>
            <div id="distanceMatrix" class="grid grid-cols-6 gap-1 text-sm"></div>
          </div>
          
          <div class="bg-green-50 rounded-xl p-3 shadow">
            <h3 class="text-sm font-medium text-gray-800 mb-2">各村庄作为医院的总交通代价</h3>
            <div id="totalCostTable" class="grid grid-cols-3 gap-1 text-sm"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const graph = {
  n: 5,
  vertices: [0, 1, 2, 3, 4],
  edges: [
    { from: 0, to: 3, weight: 4 },
    { from: 3, to: 0, weight: 4 },
    { from: 0, to: 1, weight: 13 },
    { from: 1, to: 0, weight: 13 },
    { from: 1, to: 4, weight: 5 },
    { from: 1, to: 2, weight: 15 },
    { from: 4, to: 3, weight: 3 },
    { from: 4, to: 2, weight: 6 },
    { from: 3, to: 2, weight: 12 },
    { from: 2, to: 3, weight: 12 }
  ],
  positions: {
    0: { x: 150, y: 150 },
    1: { x: 150, y: 300 },
    2: { x: 550, y: 300 },
    3: { x: 350, y: 150 },
    4: { x: 350, y: 250 }
  },
  finalDist: [
    [0, 13, 16, 4, 18],
    [12, 0, 11, 8, 5],
    [16, 29, 0, 12, 34],
    [4, 17, 12, 0, 22],
    [7, 20, 6, 3, 0]
  ],
  totalCosts: [90, 115, 136, 82, 115],
  bestVillage: 3
};

let dist = [];
let step = 0;
let k = 0;
let calcStep = 0;
let timer = null;
let isAutoPlaying = false;
let isFinished = false;

const dom = {};
['btnInit','btnStep','btnAuto','btnPause','btnShowResult','speedSlider','speedValue',
 'showStep','currentK','currentIJ','bestVillage','minTotalCost','distanceMatrix','totalCostTable',
 'graphCanvas','calcSteps'].forEach(id=>{
  dom[id] = document.getElementById(id);
});

function scrollCalcToBottom() {
  const container = dom.calcSteps;
  container.scrollTop = container.scrollHeight;
}

function clearAllAnimations() {
  clearTimeout(timer);
  timer = null;
  isAutoPlaying = false;
  dom.btnAuto.disabled = false;
  dom.btnPause.disabled = true;
}

function showCalcStep(text) {
  const el = document.createElement('div');
  el.className = 'calc-step';
  el.textContent = text;
  dom.calcSteps.appendChild(el);
  scrollCalcToBottom();
}

function drawGraph(highlightedV = -1, highlightedEdge = -1, centerV = -1) {
  const svg = dom.graphCanvas;
  svg.innerHTML = '';
  svg.setAttribute('viewBox','0 0 700 400');
  
  graph.edges.forEach((act, idx) => {
    const fromPos = graph.positions[act.from];
    const toPos = graph.positions[act.to];
    const r = 30;
    const gap = 8;
    
    const dx = toPos.x - fromPos.x;
    const dy = toPos.y - fromPos.y;
    const len = Math.hypot(dx, dy);
    const startX = fromPos.x + (r + gap) * dx / len;
    const startY = fromPos.y + (r + gap) * dy / len;
    const endX = toPos.x - (r + gap) * dx / len;
    const endY = toPos.y - (r + gap) * dy / len;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', startX);
    line.setAttribute('y1', startY);
    line.setAttribute('x2', endX);
    line.setAttribute('y2', endY);
    let lineClass = 'graph-edge normal';
    if(idx === highlightedEdge) lineClass += ' active';
    line.setAttribute('class', lineClass);
    svg.appendChild(line);
    
    const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    const arrowSize = 10;
    const arrowX = endX - arrowSize * dx / len;
    const arrowY = endY - arrowSize * dy / len;
    const leftX = arrowX - 5 * dy / len;
    const leftY = arrowY + 5 * dx / len;
    const rightX = arrowX + 5 * dy / len;
    const rightY = arrowY - 5 * dx / len;
    arrow.setAttribute('points', `${endX},${endY} ${leftX},${leftY} ${rightX},${rightY}`);
    arrow.setAttribute('class', 'arrow');
    svg.appendChild(arrow);
    
    const labelX = startX + (endX - startX)/2;
    const labelY = startY + (endY - startY)/2 - 10;
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', labelX);
    label.setAttribute('y', labelY);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', `edge-label ${idx === highlightedEdge ? 'active' : ''}`);
    label.textContent = `${act.weight}`;
    svg.appendChild(label);
  });
  
  graph.vertices.forEach((v, idx) => {
    const pos = graph.positions[v];
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pos.x);
    circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', 30);
    let circleClass = 'graph-vertex normal';
    if(v === highlightedV) circleClass += ' highlight';
    if(v === centerV) circleClass = 'graph-vertex center';
    circle.setAttribute('class', circleClass);
    svg.appendChild(circle);
    
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', pos.x);
    text.setAttribute('y', pos.y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('class', 'vertex-label');
    text.textContent = v;
    svg.appendChild(text);
  });
}

function updateDistanceMatrix(currentI = -1, currentJ = -1, updatedCells = [], highlightK = -1) {
  dom.distanceMatrix.innerHTML = `
    <div class="matrix-cell font-bold"></div>
    ${graph.vertices.map(v => `<div class="matrix-cell font-bold">${v}</div>`).join('')}
  `;
  dist.forEach((row, rowIdx) => {
    dom.distanceMatrix.innerHTML += `
      <div class="matrix-cell font-bold">${rowIdx}</div>
      ${row.map((val, colIdx) => {
        let cellClass = 'matrix-cell';
        if (updatedCells.some(c => c.i === rowIdx && c.j === colIdx)) cellClass += ' updated';
        if (rowIdx === highlightK || colIdx === highlightK) cellClass += ' hl';
        return `<div class="${cellClass}">${val === Infinity ? '∞' : val}</div>`;
      }).join('')}
    `;
  });
}

function updateTotalCostTable() {
  dom.totalCostTable.innerHTML = `
    <div class="matrix-cell font-bold">医院村庄</div>
    <div class="matrix-cell font-bold">总交通代价</div>
    <div class="matrix-cell font-bold">是否最优</div>
  `;
  const minCost = Math.min(...graph.totalCosts);
  graph.vertices.forEach(v => {
    const cost = graph.totalCosts[v];
    const isMin = cost === minCost;
    const rowClass = isMin ? 'total-cost-row min' : 'total-cost-row';
    dom.totalCostTable.innerHTML += `
      <div class="matrix-cell ${rowClass}">${v}</div>
      <div class="matrix-cell ${rowClass}">${cost}</div>
      <div class="matrix-cell ${rowClass}">${isMin ? '✅ 最优' : '❌'}</div>
    `;
  });
}

function updateUI(highlightK = -1, updatedCells = [], centerV = -1) {
  const stepNames = ['初始化', `k=${k} 迭代`, '计算总代价', '完成'];
  let currentStepName = '初始化';
  if (k >= 0 && k < graph.n) currentStepName = `k=${k} 迭代`;
  if (isFinished) currentStepName = '完成';
  dom.showStep.textContent = currentStepName;
  dom.currentK.textContent = k < graph.n ? k : '-';
  dom.currentIJ.textContent = '-';

  dom.bestVillage.textContent = isFinished ? graph.bestVillage : '-';
  dom.minTotalCost.textContent = isFinished ? Math.min(...graph.totalCosts) : '-';
  
  drawGraph(highlightK, -1, centerV);
  updateDistanceMatrix(-1, -1, updatedCells, highlightK);
  if (isFinished) updateTotalCostTable();
}

function init() {
  clearAllAnimations();
  step = 0;
  k = 0;
  calcStep = 0;
  isFinished = false;
  
  dist = Array.from({length: graph.n}, () => Array(graph.n).fill(Infinity));
  for (let idx = 0; idx < graph.n; idx++) dist[idx][idx] = 0;
  graph.edges.forEach(e => {
    dist[e.from][e.to] = e.weight;
  });
  
  dom.calcSteps.innerHTML = '<div class="calc-step" id="calc0">初始化距离矩阵D⁰</div>';
  dom.btnStep.disabled = false;
  dom.btnAuto.disabled = false;
  dom.btnShowResult.disabled = false;
  
  updateUI();
}

// 🔥 优化：单步执行 = 直接跑完一整轮 k
function doOneFloydStep() {
  if (isFinished) return;

  // 所有k轮完成
  if (k >= graph.n) {
    isFinished = true;
    showCalcStep('Floyd算法完成，开始计算各村庄总交通代价');
    
    const calcAllCosts = async () => {
      for (let v = 0; v < graph.n; v++) {
        let sum = 0;
        let goStr = '', backStr = '';
        
        for (let u = 0; u < graph.n; u++) if(u!==v) { sum += dist[u][v]; goStr += (goStr?'+':'')+dist[u][v]; }
        for (let u = 0; u < graph.n; u++) if(u!==v) { sum += dist[v][u]; backStr += (backStr?'+':'')+dist[v][u]; }
        
        showCalcStep(`村庄${v}总代价 = ${goStr} + ${backStr} = ${sum}`);
        updateUI(v);
        await new Promise(r=>setTimeout(r,dom.speedSlider.value));
      }
      showCalcStep(`最优医院：村庄${graph.bestVillage}，最小总代价${Math.min(...graph.totalCosts)}`);
      updateUI(graph.bestVillage, [], graph.bestVillage);
      dom.btnStep.disabled = true;
      dom.btnAuto.disabled = true;
    };
    calcAllCosts();
    return;
  }

  // 一轮 k 迭代（一次性跑完所有i,j）
  showCalcStep(`===== 开始 k=${k} 轮迭代 =====`);
  const updatedCells = [];

  for (let i = 0; i < graph.n; i++) {
    for (let j = 0; j < graph.n; j++) {
      const oldVal = dist[i][j];
      const newVal = dist[i][k] + dist[k][j];
      if (newVal < oldVal) {
        dist[i][j] = newVal;
        updatedCells.push({i,j});
        showCalcStep(`D[${i}][${j}] = ${oldVal} → ${newVal}`);
      }
    }
  }

  updateUI(k, updatedCells);
  showCalcStep(`===== k=${k} 轮迭代完成 =====`);
  k++;
}

async function autoPlay() {
  if (isAutoPlaying || isFinished) return;
  isAutoPlaying = true;
  dom.btnAuto.disabled = true;
  dom.btnPause.disabled = false;
  
  const autoStep = async () => {
    if (!isAutoPlaying || isFinished) return;
    doOneFloydStep();
    timer = setTimeout(autoStep, dom.speedSlider.value);
  };
  autoStep();
}

function pausePlay() {
  clearAllAnimations();
}

function showResult() {
  isFinished = true;
  k = graph.n;
  dist = JSON.parse(JSON.stringify(graph.finalDist));
  showCalcStep('直接展示最终结果');
  dom.btnStep.disabled = true;
  dom.btnAuto.disabled = true;
  updateUI(-1, [], graph.bestVillage);
}

dom.btnInit.onclick = init;
dom.btnStep.onclick = doOneFloydStep;
dom.btnAuto.onclick = autoPlay;
dom.btnPause.onclick = pausePlay;
dom.btnShowResult.onclick = showResult;
dom.speedSlider.oninput = () => {
  dom.speedValue.textContent = dom.speedSlider.value + ' ms';
};

window.onload = init;
</script>
</body>
</html>
