<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script>
(function () {
  if (window.__htmlSanitizerInstalled) return;
  window.__htmlSanitizerInstalled = true;

  const descriptor = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  if (!descriptor || !descriptor.set || !descriptor.get) return;

  const nativeSetter = descriptor.set;
  const nativeGetter = descriptor.get;
  const allowedTags = new Set(['A','B','BR','BUTTON','CODE','DIV','EM','I','LI','OL','P','PRE','SMALL','SPAN','STRONG','SUB','SUP','TABLE','TBODY','TD','TH','THEAD','TR','UL']);
  const urlAttrs = new Set(['href','src','xlink:href']);
  const allowedAttrs = new Set(['class','id','role','title','style','colspan','rowspan','disabled','readonly','type','value','min','max','step']);

  function isSafeAttr(name, value) {
    const lowerName = name.toLowerCase();
    const lowerValue = String(value || '').trim().toLowerCase();
    if (lowerName.startsWith('on')) return false;
    if (lowerName.startsWith('aria-') || lowerName.startsWith('data-')) return true;
    if (!allowedAttrs.has(lowerName) && !urlAttrs.has(lowerName)) return false;
    if (urlAttrs.has(lowerName)) return /^(#|\/|\.\/|\.\.\/|https?:)/i.test(String(value || '').trim());
    if (lowerName === 'style') return !/(expression\s*\(|url\s*\(|javascript\s*:)/i.test(String(value || ''));
    return true;
  }

  function sanitizeHTML(value) {
    const template = document.createElement('template');
    nativeSetter.call(template, String(value ?? ''));
    template.content.querySelectorAll('*').forEach((node) => {
      if (!allowedTags.has(node.tagName)) {
        node.replaceWith(document.createTextNode(node.textContent || ''));
        return;
      }
      Array.from(node.attributes).forEach((attr) => {
        if (!isSafeAttr(attr.name, attr.value)) node.removeAttribute(attr.name);
      });
    });
    return nativeGetter.call(template);
  }

  window.escapeHTML = function (value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  };

  Object.defineProperty(Element.prototype, 'innerHTML', {
    configurable: true,
    enumerable: descriptor.enumerable,
    get: function () { return nativeGetter.call(this); },
    set: function (value) { nativeSetter.call(this, sanitizeHTML(value)); }
  });

  const nativeInsertAdjacentHTML = Element.prototype.insertAdjacentHTML;
  Element.prototype.insertAdjacentHTML = function (position, value) {
    return nativeInsertAdjacentHTML.call(this, position, sanitizeHTML(value));
  };
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双关键字排序动态演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .node {
            transition: all 0.5s ease;
        }
        .highlight {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">双关键字排序动态演示</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">排序规则</h2>
            <p class="mb-2">1. 先按 k₁ 升序排序</p>
            <p class="mb-2">2. k₁ 相同时，按 k₂ 升序排序</p>
            <p class="mb-2">3. 采用“先次要后主要”的基数排序策略</p>
            <p class="mb-2">4. 先按 k₂ 排序（简单选择排序），再按 k₁ 排序（直接插入排序）</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">初始数据</h3>
                <div id="initial-data" class="space-y-2"></div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">当前状态</h3>
                <div id="current-step" class="text-lg font-medium mb-2"></div>
                <div id="current-data" class="space-y-2"></div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h3 class="text-lg font-semibold mb-4">排序过程</h3>
            <div class="space-y-4">
                <div class="flex flex-wrap items-center gap-2">
                    <button id="step1" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">
                        第一步：按 k₂ 简单选择排序
                    </button>
                    <button id="step2" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded transition" disabled>
                        第二步：按 k₁ 直接插入排序
                    </button>
                    <button id="reset" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition">
                        重置
                    </button>
                </div>
                <div id="explanation" class="text-gray-700"></div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold mb-4">最终结果</h3>
            <div id="final-result" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // 初始数据
        const initialData = [
            { id: 1, k1: 80, k2: 90 },
            { id: 2, k1: 70, k2: 90 },
            { id: 3, k1: 80, k2: 72 },
            { id: 4, k1: 70, k2: 72 }
        ];

        let currentData = [...initialData];
        let step = 0;

        // 渲染数据
        function renderData(data, containerId, highlightId = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = `node flex items-center space-x-4 p-3 rounded-lg border ${
                    item.id === highlightId ? 'border-2 border-red-500 bg-red-50' : 'border-gray-200'
                }`;
                div.innerHTML = `
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center font-bold">
                        ${item.id}
                    </div>
                    <div class="flex space-x-4">
                        <div class="text-center">
                            <div class="text-sm text-gray-600">k₁</div>
                            <div class="font-semibold">${item.k1}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-sm text-gray-600">k₂</div>
                            <div class="font-semibold">${item.k2}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 简单选择排序（按k2）
        function simpleSelectionSortByK2() {
            const data = [...currentData];
            const n = data.length;
            
            for (let i = 0; i < n - 1; i++) {
                let minIndex = i;
                for (let j = i + 1; j < n; j++) {
                    if (data[j].k2 < data[minIndex].k2) {
                        minIndex = j;
                    }
                }
                if (minIndex !== i) {
                    [data[i], data[minIndex]] = [data[minIndex], data[i]];
                }
            }
            
            return data;
        }

        // 直接插入排序（按k1）
        function insertionSortByK1(data) {
            const arr = [...data];
            const n = arr.length;
            
            for (let i = 1; i < n; i++) {
                const key = arr[i];
                let j = i - 1;
                
                while (j >= 0 && arr[j].k1 > key.k1) {
                    arr[j + 1] = arr[j];
                    j--;
                }
                arr[j + 1] = key;
            }
            
            return arr;
        }

        // 第一步：按k2简单选择排序
        document.getElementById('step1').addEventListener('click', () => {
            if (step !== 0) return;
            
            const sortedByK2 = simpleSelectionSortByK2();
            currentData = sortedByK2;
            
            document.getElementById('current-step').textContent = '第一步：按 k₂ 简单选择排序完成';
            document.getElementById('explanation').innerHTML = `
                <p class="mb-2"><strong>简单选择排序特点：</strong></p>
                <p class="mb-1">• 不稳定排序，可能改变相同k₂值元素的相对位置</p>
                <p class="mb-1">• 但在本例中，k₂值都不相同，所以排序结果正确</p>
                <p class="mb-1">• 排序后k₂值按升序排列：72, 72, 90, 90</p>
            `;
            
            renderData(currentData, 'current-data');
            document.getElementById('step1').disabled = true;
            document.getElementById('step2').disabled = false;
            step = 1;
        });

        // 第二步：按k1直接插入排序
        document.getElementById('step2').addEventListener('click', () => {
            if (step !== 1) return;
            
            const sortedByK1 = insertionSortByK1(currentData);
            currentData = sortedByK1;
            
            document.getElementById('current-step').textContent = '第二步：按 k₁ 直接插入排序完成';
            document.getElementById('explanation').innerHTML = `
                <p class="mb-2"><strong>直接插入排序特点：</strong></p>
                <p class="mb-1">• 稳定排序，保持相同k₁值元素的相对位置</p>
                <p class="mb-1">• 这保证了k₁相同时，k₂的顺序保持不变</p>
                <p class="mb-1">• 最终结果：先按k₁升序，k₁相同时按k₂升序</p>
            `;
            
            renderData(currentData, 'current-data');
            renderData(currentData, 'final-result');
            document.getElementById('step2').disabled = true;
            step = 2;
        });

        // 重置
        document.getElementById('reset').addEventListener('click', () => {
            currentData = [...initialData];
            step = 0;
            
            document.getElementById('current-step').textContent = '';
            document.getElementById('explanation').innerHTML = '';
            document.getElementById('final-result').innerHTML = '';
            
            renderData(currentData, 'initial-data');
            renderData([], 'current-data');
            
            document.getElementById('step1').disabled = false;
            document.getElementById('step2').disabled = true;
        });

        // 初始渲染
        renderData(initialData, 'initial-data');
    </script>
</body>
</html>
